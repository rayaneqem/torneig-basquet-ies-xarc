name: Enviar recordatoris partits

on:
  schedule:
    - cron: '0 13 * * *'   # 13h UTC = 14h hora espanyola (hivern)
  workflow_dispatch:         # permet executar-lo manualment per provar

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Executar script de notificacions
        run: node notify.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
